<!DOCTYPE html>
<html lang="tr">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ratel Solutions FSM - Field Service Management">

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://www.gstatic.com 'unsafe-inline' 'unsafe-eval';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https: blob:;
    connect-src 'self' https://*.firebaseapp.com https://*.googleapis.com https://*.gstatic.com wss://*.firebaseio.com https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com;
    frame-src 'self' https://*.firebaseapp.com https://accounts.google.com;
  ">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="takipversie1">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Android/Chrome PWA meta tags -->
  <meta name="theme-color" content="#0D1B2A">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>takipversie1</title>
  <link rel="manifest" href="manifest.json">

  <!-- Fallback for browsers without JavaScript (rare but possible) -->
  <noscript>
    <div style="text-align:center;padding:40px;font-family:sans-serif;background:#0D1B2A;color:#fff;height:100vh;">
      <h2>JavaScript Required</h2>
      <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
    </div>
  </noscript>

  <!-- Preload critical assets for faster first paint on mobile -->
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="flutter_bootstrap.js" as="script">

  <!-- Firebase SDKs for FCM (TEAM-02) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"
          crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"
          crossorigin="anonymous"></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
